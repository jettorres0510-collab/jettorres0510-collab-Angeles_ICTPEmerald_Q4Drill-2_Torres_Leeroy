<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heat Index Checker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background: linear-gradient(#FF6200);
            background-attachment: fixed;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .main-card {
            background: white;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 400px;
        }

        .title {
            font-weight: 800;
            color: black;
            text-align: center;
            margin-bottom: 10px;
        }

        .instruction-text {
            text-align: center;
            font-size: 14px;
            color: #666;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            font-weight: 700;
            font-size: 12px;
            color: #444;
            text-transform: uppercase;
            display: block;
            margin-bottom: 5px;
        }

        .form-control {
            border: 1.5px solid #eee;
            border-radius: 10px;
            padding: 12px;
            font-size: 16px;
        }

        .form-control:focus {
            border-color: #f39c12;
            box-shadow: none;
            outline: none;
        }

        .check-btn {
            background-color: #FF6200;
            color: #fff;
            border: none;
            width: 100%;
            padding: 15px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }

        .check-btn:hover {
            background-color: #d35400;
        }

        .footer-text {
            margin-top: 25px;
            font-size: 11px;
            color: #ccc;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="main-card">
        <h2 class="title">Heat Index Checker</h2>
        
        <p class="instruction-text">
            Input the temperature (°C) and humidity (%), then click Check to see the heat index and its status.
        </p>
        
        <div class="form-group">
            <label>Degree in °C</label>
            <input type="number" id="tempInput" class="form-control" placeholder="Input degree value">
        </div>

        <div class="form-group">
            <label>humidity in %</label>
            <input type="number" id="humidityInput" class="form-control" placeholder="Input percentage value">
        </div>

        <button onclick="checkHeatIndex()" class="check-btn">
            Check
        </button>

        <div class="footer-text">
            ICT 9 | Sources: NOAA & W3Schools
        </div>
    </div>

    <script>
        function checkHeatIndex() {
            const temp = parseFloat(document.getElementById('tempInput').value);
            const humidity = parseFloat(document.getElementById('humidityInput').value);
            
            if (isNaN(temp) || isNaN(humidity)) {
                alert("Please fill in both fields with valid numbers.");
                return;
            }

            let heatIndex = temp + (0.33 * humidity) - 4;
            heatIndex = heatIndex.toFixed(1);

            let status = "";

            if (heatIndex <= 27) {
                status = "Comfortable / Cool";
            } else if (heatIndex >= 28 && heatIndex <= 32) {
                status = "Warm";
            } else if (heatIndex >= 33 && heatIndex <= 37) {
                status = "Hot";
            } else if (heatIndex >= 38 && heatIndex <= 41) {
                status = "Very Hot / Caution";
            } else {
                status = "Extreme Heat / Danger";
            }

            alert("Heat Index: " + heatIndex + "°C\nStatus: " + status);
        }
    </script>

</body>
</html>
